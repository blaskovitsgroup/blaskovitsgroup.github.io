<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blaskovits Group – Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Roboto', Arial, Helvetica, sans-serif;
      color: #222;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid #ddd;
      flex-wrap: wrap; 
      gap: 15px; 
    }

    header h1 {
      margin: 0;
      font-size: 1.6rem;
      font-weight: 400;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    nav a {
      text-decoration: none;
      color: #004080;
      font-weight: 400;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* Main content */
    main {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }

    .group-photo {
      width: 100%;
      max-width: 800px;
      height: 350px;
      margin: 0 auto 40px auto;
      background: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #555;
      overflow: hidden; 
    }

    /* News section */
    .news {
      text-align: left;
      max-width: 800px;
      margin: 0 auto 60px auto;
    }

    .news h2 {
      border-bottom: 2px solid #004080;
      padding-bottom: 5px;
      font-weight: 400;
    }

    .news-item {
      margin: 15px 0;
    }

    .news-date {
      font-weight: 400;
      color: #444;
    }

    /* Footer */
    footer {
      background: #f0f0f0;
      padding: 30px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap; 
      gap: 20px;
    }

    .address {
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .logo {
      width: 100%;
      max-width: 300px;
      height: auto; 
      background-color: transparent;
    }
    
    .amii {
      width: 100%;
      max-width: 108px;
      height: auto; 
      background-color: transparent;
    }

    /* --- MOBILE RESPONSIVENESS --- */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        text-align: center;
        padding: 20px;
      }

      nav {
        justify-content: center;
      }

      .group-photo {
        height: 250px; 
      }

      footer {
        flex-direction: column;
        text-align: center;
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Blaskovits Group</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="members.html">Members</a>
      <a href="publications.html">Publications</a>
      <a href="join.html">Join</a>
      <a href="https://github.com/blaskovits-lab/">Github</a>
    </nav>
  </header>

  <main>
    <div class="group-photo">
      <img src="pics/group.jpeg" style="width:100%; height:100%; object-fit:cover;" alt="Blaskovits Group Members" />
    </div>

    <section class="news">
      <h2>News</h2>

      <div class="news-item">
        <div class="news-date"></div>
        <div></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="address">
      Department of Chemistry<br />
      University of Alberta<br />
      W4-70B Chemistry Centre - West<br />
      11227 Saskatchewan Drive<br />
      Edmonton, Alberta, Canada T6G 2G2<br />
    </div>

    <img class="amii" src="pics/amii.png" alt="Amii Logo" />
    
    <img class="logo" src="pics/UOA-300x70.png" alt="University of Alberta Logo" />
  </footer>

</body>
</html>
